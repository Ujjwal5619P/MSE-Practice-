name: CI pipeline

on:
    push:
        branches:
            - main

jobs:
    build:
        runs-on: ubuntu-latest

        steps: 
            - name: Checkout code
              uses: actions/checkout@v4
            
            - name: setup node
              uses: actions/setup-node@v4
              with:
                node-version: 18

            - name: install dependencies
              run: npm install

            - name: run app.js
              run: echo "Build successful! Running app.js..." 
            - name: Install Conftest
              run: |
                wget https://github.com/open-policy-agent/conftest/releases/download/v0.64.0/conftest_0.64.0_Linux_x86_64.tar.gz
                tar xzf conftest_0.64.0_Linux_x86_64.tar.gz
                sudo mv conftest /usr/local/bin

            - name: Run Conftest
              run: conftest test config.json --policy policy/
    

